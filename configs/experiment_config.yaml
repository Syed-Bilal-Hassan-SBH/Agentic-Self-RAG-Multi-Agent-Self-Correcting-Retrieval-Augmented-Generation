# configs/experiment_config.yaml
# Complete configuration for reproducible experiments
# Modified: 2025-01-24 - Initial configuration with all hyperparameters

experiment:
  name: "agentic_self_rag_main"
  random_seed: 42
  num_samples: 500
  smoke_test_samples: 5
  
dataset:
  name: "hotpot_qa"
  config: "distractor"
  split: "validation"
  cache_dir: "data/"
  
model:
  llm_provider: "groq"  # Options: groq, huggingface, openai
  llm_model: "llama-3.3-70b-versatile"
  temperature: 0.0
  max_tokens: 1024
  embedding_model: "sentence-transformers/all-MiniLM-L6-v2"
  spacy_model: "en_core_web_sm"
  
retrieval:
  top_k: 5
  multi_hop_k: 10
  similarity_threshold: 0.5
  use_reranking: false
  
agentic_rag:
  max_iterations: 4
  use_multi_hop: true
  use_adaptive_iteration: true
  confidence_threshold_high: 0.85  # Early stopping
  confidence_threshold_low: 0.50   # Plateau detection
  
verifier:
  # Multi-signal weights (must sum to 1.0)
  weight_semantic: 0.40
  weight_entity: 0.30
  weight_token: 0.20
  weight_length: 0.10
  
  # Verdict thresholds
  threshold_supported: 0.75
  threshold_partial: 0.50
  
  # Caching
  cache_embeddings: true
  batch_size: 32
  
evaluation:
  metrics:
    - "exact_match"
    - "f1_score"
    - "token_overlap"
  
  statistical_tests:
    - "paired_t_test"
    - "wilcoxon"
    - "cohen_d"
  
  alpha: 0.05  # Significance level
  
logging:
  level: "INFO"
  save_predictions: true
  save_intermediate_states: false
  log_file: "results/experiment.log"
  
docker:
  base_image: "python:3.10-slim"
  gpu_support: false