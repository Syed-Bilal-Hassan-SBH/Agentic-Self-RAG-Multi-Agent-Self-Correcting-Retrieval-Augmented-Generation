# docker-compose.yml
version: '3.8'

services:
  agentic-self-rag:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agentic-self-rag
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - NUM_SAMPLES=${NUM_SAMPLES:-500}
    volumes:
      - ./results:/app/results
      - ./data:/app/data
    command: python experiments/run_main_evaluation.py

  ablation-study:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agentic-ablations
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
    volumes:
      - ./results:/app/results
    command: python experiments/run_ablations.py

  smoke-test:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agentic-smoke
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - NUM_SAMPLES=5
    volumes:
      - ./results:/app/results
    command: python experiments/run_main_evaluation.py